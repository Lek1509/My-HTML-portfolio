<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>
  <body>
    <header>
        <h1 id="title">Survey Form</h1>
        <p id="description">Thank you for taking the time to help us improve the platform</p>
    </header>
    <main>
        <form id="survey-form">
            <label for="name" id="name-label">Name:</label>
            <input type="text" id="name" required placeholder="enter your name"><br>
            <label for="email" id="email-label">Email:</label>
            <input type="email" id="email" required placeholder="lexterlampas@gmail.com"><br>
            <label for="number" id="number-label">Age:</label>
            <input type="number" id="number" min="10" max="12" placeholder="Age"><br>
            <label for="gender">Gender:</label>
            <input type="checkbox" value="textbox">male
            <input type="checkbox" value="textbox">female<br><br>

            <select id="dropdown" >
              
                <option value="option1">Select your hobbies</option>
                <option value="option2">Sleeping</option>
                <option value="option3">Playing online games</option>
                <option value="option4">Reading books</option>
                <option value="option5">Playing basketball</option>
                <option value="option6">others</option>
            </select><br>
            <textarea placeholder="others..."></textarea><br>

            <p>What benefits do you get from doing this hobbies?</p>
            <input type="radio" value="radio" name="radio">reduce boredomeness<br>
            <input type="radio" value="radio" name="radio">improve my mental health<br>
            <input type="radio" value="radio" name="radio">socialize with other people<br>
            <input type="radio" value="radio" name="radio">others<br>

            <textarea placeholder="others..."></textarea><br>
            
            <p>Thank you for filling out this form!</p>
            <button type="submit" id="submit">Submit</button> 
        </form>
    </main>

  </body>
</html>
